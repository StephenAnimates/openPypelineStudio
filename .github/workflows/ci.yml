name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        maya-version: ["2025", "2026", "2027"]
        include:
          - maya-version: "2025"
            python-version: "3.11"
          - maya-version: "2026"
            python-version: "3.12"
          - maya-version: "2027"
            python-version: "3.13"
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }} for Maya ${{ matrix.maya-version }}
      uses: actions/setup-python@v4
      with:
        python-version: "${{ matrix.python-version }}"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all other issues as warnings so it doesn't block your workflow
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
    - name: Run unit tests
      run: |
        # Uncomment the line below when your test suite is ready:
        # pytest

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install documentation dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sphinx sphinx_rtd_theme
    - name: Build documentation
      run: |
        # Run sphinx build to catch any autodoc or configuration errors
        sphinx-build -b html utilities/ utilities/_build/html